global:
  scrape_interval: 15s

scrape_configs:

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: mongodb
    static_configs:
      - targets:
          - mongodb-exporter:9216
